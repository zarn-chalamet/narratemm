spring.application.name=narratemm-backend

server.port=8080

# Database
spring.datasource.url=jdbc:h2:file:./data/narratemm;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# File Storage
app.storage.base-path=./storage

# API Keys ⬇️ FILL THESE ⬇️
app.api.groq-key=${GROQ_API_KEY}
app.api.gemini-key=${GEMINI_API_KEY}
app.api.supadata-key=${SUPADATA_API_KEY}


# API URLs
app.api.gemini-url=https://generativelanguage.googleapis.com/v1beta
app.api.groq-url=https://api.groq.com/openai/v1
app.api.supadata-url=https://api.supadata.ai/v1

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# File Uploads
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Async
app.async.core-pool-size=2
app.async.max-pool-size=5
app.async.queue-capacity=100